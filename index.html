<!DOCTYPE html>
<html>
<head>
    <title>AI Code Explainer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        textarea {
            width: 70%;
            height: 200px;
            border-radius: 10px;
            border: none;
            padding: 15px;
            font-size: 16px;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #00c6ff;
            color: black;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #0072ff;
            color: white;
        }

        .output {
            margin-top: 30px;
            background: white;
            color: black;
            padding: 20px;
            border-radius: 10px;
            width: 70%;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
            font-size: 18px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <h1>🤖 AI Code Explainer</h1>

    <textarea id="code" placeholder="Paste your code here..."></textarea><br>

    <button onclick="explainCode()">Explain Code</button>

    <div class="output">
        <h3>Explanation:</h3>
        <p id="result">Your explanation will appear here...</p>
    </div>

    <script>
        function explainCode() {
            const code = document.getElementById("code").value;

            fetch("/explain", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ code: code })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText = data.explanation;
            });
        }
    </script>

</body>
</html>
